name: Release

on:
  workflow_call:
    outputs:
      version:
        description: "The new version (e.g. 1.2.3)"
        value: ${{ jobs.release.outputs.version }}
      should_release:
        description: "Whether a release was created"
        value: ${{ jobs.release.outputs.should_release }}
      changelog:
        description: "Generated changelog"
        value: ${{ jobs.release.outputs.changelog }}

permissions:
  contents: write

jobs:
  release:
    name: release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
      should_release: ${{ steps.semver.outputs.should_release }}
      changelog: ${{ steps.semver.outputs.changelog }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Calculate version
        id: semver
        run: |
          # Find the latest stable (non-draft) semver tag
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1 || true)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
            MAJOR=0; MINOR=0; PATCH=0
            REF="$(git rev-list --max-parents=0 HEAD)"
          else
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            REF="$LATEST_TAG"
          fi

          echo "Latest stable tag: $LATEST_TAG (${MAJOR}.${MINOR}.${PATCH})"

          # Read commits since last stable tag
          COMMITS=$(git log "${REF}..HEAD" --pretty=format:"%H %s" 2>/dev/null || true)
          if [ -z "$COMMITS" ]; then
            echo "No new commits since last tag"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump level from commit bodies
          BUMP=""
          BREAKING=""
          FEATURES=""
          FIXES=""

          while IFS= read -r line; do
            HASH=$(echo "$line" | cut -d' ' -f1)
            SUBJECT=$(echo "$line" | cut -d' ' -f2-)
            BODY=$(git log -1 --pretty=format:"%b" "$HASH")

            if echo "$BODY" | grep -qi "semver: major"; then
              BUMP="major"
              BREAKING="${BREAKING}- ${SUBJECT}\n"
            elif echo "$BODY" | grep -qi "semver: minor"; then
              [ "$BUMP" != "major" ] && BUMP="minor"
              FEATURES="${FEATURES}- ${SUBJECT}\n"
            elif echo "$BODY" | grep -qi "semver: patch"; then
              [ "$BUMP" != "major" ] && [ "$BUMP" != "minor" ] && BUMP="patch"
              FIXES="${FIXES}- ${SUBJECT}\n"
            fi
          done <<< "$COMMITS"

          if [ -z "$BUMP" ]; then
            echo "No semver tags found in commits"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Calculate new version
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW_VERSION ($BUMP bump)"

          # Generate changelog
          CHANGELOG=""
          if [ -n "$BREAKING" ]; then
            CHANGELOG="${CHANGELOG}### Breaking changes\n${BREAKING}\n"
          fi
          if [ -n "$FEATURES" ]; then
            CHANGELOG="${CHANGELOG}### New features\n${FEATURES}\n"
          fi
          if [ -n "$FIXES" ]; then
            CHANGELOG="${CHANGELOG}### Fixes\n${FIXES}\n"
          fi

          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changelog<<${EOF}" >> "$GITHUB_OUTPUT"
          echo -e "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "${EOF}" >> "$GITHUB_OUTPUT"

      - name: Delete existing draft release
        if: steps.semver.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.semver.outputs.version }}"
          DRAFT_TAG="v${VERSION}-draft"

          # Delete existing draft release if it exists
          RELEASE_ID=$(gh release view "$DRAFT_TAG" --json id --jq '.id' 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting existing draft release for $DRAFT_TAG"
            gh release delete "$DRAFT_TAG" --yes
          fi

          # Delete existing draft tag if it exists
          git push origin ":refs/tags/${DRAFT_TAG}" 2>/dev/null || true

      - name: Create draft release
        if: steps.semver.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.semver.outputs.version }}"
          DRAFT_TAG="v${VERSION}-draft"

          git tag -f "$DRAFT_TAG"
          git push origin "$DRAFT_TAG"

          gh release create "$DRAFT_TAG" \
            --title "v${VERSION}" \
            --notes "${{ steps.semver.outputs.changelog }}" \
            --draft
